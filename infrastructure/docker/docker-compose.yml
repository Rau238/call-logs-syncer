services:
  postgres:
    image: postgres:16-alpine
    container_name: call-log-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: calllog
      POSTGRES_PASSWORD: calllog_secret
      POSTGRES_DB: call_log_sync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calllog -d call_log_sync"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
