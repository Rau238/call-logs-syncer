<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Call Log Sync</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Call Log Sync</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>System Status</ion-card-title>
      <ion-card-subtitle>Enterprise Call Log Synchronization</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p>{{ bridgeStatus }}</p>
      <ion-button expand="block" (click)="testBridge()" [disabled]="isLoading">
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Test Plugin Bridge</span>
      </ion-button>
      <ion-button expand="block" color="success" (click)="goToCallLog()" [disabled]="!appReady">
        Open Call Log Dashboard
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Device Info</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p><strong>Device ID:</strong> {{ deviceId || 'Loading...' }}</p>
      <ion-list>
        <ion-item *ngFor="let perm of permissions | keyvalue">
          <ion-label>{{ perm.key }}</ion-label>
          <ion-badge [color]="perm.value ? 'success' : 'danger'" slot="end">
            {{ perm.value ? 'Granted' : 'Denied' }}
          </ion-badge>
        </ion-item>
      </ion-list>
      <ion-button expand="block" fill="outline" (click)="requestPermissions()">
        Request Permissions
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
